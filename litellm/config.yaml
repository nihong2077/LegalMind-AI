model_list:
  - model_name: deepseek-v4-pro
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      rpm: 10
      tpm: 100000
    model_info:
      mode: chat
      description: "DeepSeek V4 Pro - 大型法律分析、合同审查"

  - model_name: deepseek-flash
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      rpm: 30
      tpm: 200000
    model_info:
      mode: chat
      description: "DeepSeek Flash - 快速法律检索、简单问答"

router_settings:
  routing_strategy: usage-based-routing-v2
  allowed_fails: 3
  cooldown_time: 60
  num_retries: 2
  timeout: 60
  retry_after: 0
  fallbacks:
    - deepseek-v4-pro:
        - deepseek-flash
    - deepseek-flash:
        - deepseek-v4-pro

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  turn_off_message_logging: true
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    namespace: "litellm_cache"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  max_budget: 100
  budget_duration: 30d

success_callback:
  - prometheus
failure_callback:
  - prometheus
