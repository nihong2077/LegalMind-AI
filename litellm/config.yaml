model_list:
  - model_name: gemma4-9b
    litellm_params:
      model: openai/gemma4-9b
      api_base: http://vllm:8000/v1
      api_key: os.environ/VLLM_API_KEY
      rpm: 30
      tpm: 100000
    model_info:
      mode: chat
      description: "Gemma4-9B AWQ4bit 本地模型"

  - model_name: qwen3-1.5b
    litellm_params:
      model: openai/qwen3-1.5b
      api_base: http://vllm:8000/v1
      api_key: os.environ/VLLM_API_KEY
      rpm: 60
      tpm: 200000
    model_info:
      mode: chat
      description: "Qwen3-1.5B INT8 本地模型"

  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      rpm: 10
      tpm: 50000
    model_info:
      mode: chat
      description: "DeepSeek Chat 云端模型"

router_settings:
  routing_strategy: usage-based-routing-v2
  allowed_fails: 3
  cooldown_time: 60
  num_retries: 2
  timeout: 30
  retry_after: 0
  fallbacks:
    - gemma4-9b:
        - deepseek-chat
    - qwen3-1.5b:
        - gemma4-9b

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  turn_off_message_logging: true
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    namespace: "litellm_cache"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  max_budget: 100
  budget_duration: 30d

success_callback:
  - prometheus
failure_callback:
  - prometheus
