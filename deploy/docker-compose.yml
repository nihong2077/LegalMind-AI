services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LITELLM_PROXY_URL=http://litellm:4000
      - LITELLM_VIRTUAL_KEY=${LITELLM_VIRTUAL_KEY}
    depends_on:
      - redis

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
